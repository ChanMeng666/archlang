<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ArchLang Playground — code to floor plans</title>
    <meta
      name="description"
      content="Live playground for ArchLang — a small language that compiles to professional SVG floor plans. CodeMirror 6 editor with syntax highlighting and inline lint."
    />
  </head>
  <body>
    <header>
      <h1><b>Arch</b>Lang <span class="tag">— code → floor plans</span></h1>
      <div class="spacer"></div>
      <select id="examples" aria-label="Load example"></select>
      <button id="download">Download SVG</button>
      <a class="btn" href="https://github.com/chanmeng666/archlang" target="_blank" rel="noopener">GitHub</a>
    </header>
    <main>
      <section class="pane">
        <h2>source.arch</h2>
        <div id="editor"></div>
        <div id="errors"></div>
      </section>
      <section class="pane">
        <h2><span class="dot" id="status"></span><span id="statusText">ready</span></h2>
        <div id="preview"></div>
      </section>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
