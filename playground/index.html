<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ArchLang Playground — code to floor plans</title>
    <meta
      name="description"
      content="Live playground for ArchLang — a small language that compiles to professional SVG floor plans. CodeMirror 6 editor with syntax highlighting and inline lint."
    />
  </head>
  <body>
    <header>
      <h1><b>Arch</b>Lang <span class="tag">— code → floor plans</span></h1>
      <div class="spacer"></div>
      <select id="examples" aria-label="Load example"></select>
      <select id="format" aria-label="Download format">
        <option value="svg">SVG</option>
        <option value="png">PNG</option>
        <option value="dxf">DXF</option>
        <option value="pdf">PDF</option>
      </select>
      <button id="download">Download</button>
      <a class="btn" href="https://archlang-docs.vercel.app/spec" target="_blank" rel="noopener">Spec</a>
      <a class="btn" href="https://github.com/chanmeng666/archlang" target="_blank" rel="noopener">GitHub</a>
    </header>
    <main>
      <section class="pane">
        <h2>source.arch</h2>
        <div id="editor"></div>
        <div id="errors"></div>
      </section>
      <section class="pane">
        <h2>
          <span class="dot" id="status"></span><span id="statusText">ready</span>
          <span class="grow"></span>
          <span class="tabs" role="tablist">
            <button class="tab active" data-tab="preview" type="button">Preview</button>
            <button class="tab" data-tab="describe" type="button">Describe</button>
            <button class="tab" data-tab="lint" type="button">Lint</button>
          </span>
        </h2>
        <div id="preview" class="tabview active" role="tabpanel"></div>
        <pre id="describe" class="tabview" role="tabpanel"></pre>
        <div id="lint" class="tabview" role="tabpanel"></div>
      </section>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
