<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ArchLang Playground — code to floor plans</title>
    <meta
      name="description"
      content="Live playground for ArchLang — a small language that compiles to professional SVG floor plans."
    />
    <style>
      :root {
        --bg: #f6f5f1;
        --panel: #ffffff;
        --ink: #1b1b1b;
        --muted: #7a7a7a;
        --accent: #0e5484;
        --border: #e3e0d8;
        --err: #b3261e;
        --mono: ui-monospace, "SF Mono", "Cascadia Code", Menlo, Consolas, monospace;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        color: var(--ink);
        background: var(--bg);
        display: flex;
        flex-direction: column;
      }
      header {
        display: flex;
        align-items: baseline;
        gap: 14px;
        padding: 12px 18px;
        border-bottom: 1px solid var(--border);
        background: var(--panel);
        flex-wrap: wrap;
      }
      header h1 { font-size: 18px; margin: 0; letter-spacing: -0.01em; }
      header h1 b { color: var(--accent); }
      header .tag { color: var(--muted); font-size: 13px; }
      header .spacer { flex: 1; }
      header select, header button, header a.btn {
        font: inherit;
        font-size: 13px;
        padding: 6px 10px;
        border: 1px solid var(--border);
        border-radius: 7px;
        background: #fff;
        color: var(--ink);
        cursor: pointer;
        text-decoration: none;
      }
      header button:hover, header a.btn:hover, header select:hover { border-color: var(--accent); }
      main { flex: 1; display: grid; grid-template-columns: 1fr 1fr; min-height: 0; }
      .pane { display: flex; flex-direction: column; min-height: 0; min-width: 0; }
      .pane + .pane { border-left: 1px solid var(--border); }
      .pane h2 {
        font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
        color: var(--muted); margin: 0; padding: 8px 14px; border-bottom: 1px solid var(--border);
        background: var(--panel); display: flex; align-items: center; gap: 8px;
      }
      .dot { width: 8px; height: 8px; border-radius: 50%; background: #34a853; }
      .dot.err { background: var(--err); }
      textarea {
        flex: 1; resize: none; border: 0; outline: 0; padding: 14px;
        font-family: var(--mono); font-size: 13px; line-height: 1.55; color: var(--ink);
        background: var(--panel); tab-size: 2;
      }
      #preview { flex: 1; overflow: auto; background:
        repeating-conic-gradient(#f0efe9 0% 25%, #f6f5f1 0% 50%) 50% / 22px 22px;
        display: flex; align-items: center; justify-content: center; padding: 18px; }
      #preview svg { max-width: 100%; max-height: 100%; box-shadow: 0 2px 14px rgba(0,0,0,0.10); background: #fff; }
      #errors {
        font-family: var(--mono); font-size: 12.5px; color: var(--err);
        padding: 10px 14px; border-top: 1px solid var(--border); background: #fff5f5;
        white-space: pre-wrap; display: none; max-height: 30%; overflow: auto;
      }
      #errors.show { display: block; }
      @media (max-width: 760px) { main { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; } .pane + .pane { border-left: 0; border-top: 1px solid var(--border); } }
    </style>
  </head>
  <body>
    <header>
      <h1><b>Arch</b>Lang <span class="tag">— code → floor plans</span></h1>
      <div class="spacer"></div>
      <select id="examples" aria-label="Load example"></select>
      <button id="download">Download SVG</button>
      <a class="btn" href="https://github.com/chanmeng666/archlang" target="_blank" rel="noopener">GitHub</a>
    </header>
    <main>
      <section class="pane">
        <h2>source.arch</h2>
        <textarea id="src" spellcheck="false" autocomplete="off"></textarea>
        <div id="errors"></div>
      </section>
      <section class="pane">
        <h2><span class="dot" id="status"></span><span id="statusText">ready</span></h2>
        <div id="preview"></div>
      </section>
    </main>

    <script type="module">
      import { compile } from "./lib/archlang.js";

      const EXAMPLES = {
        "Studio (1BR)": `plan "Studio 1BR" {
  units mm
  grid 50
  scale 1:50
  north up

  wall exterior thickness 200 { (0,0) (7000,0) (7000,6000) (0,6000) close }
  wall partition thickness 100 { (4000,0) (4000,4000) }
  wall partition thickness 100 { (4000,4000) (7000,4000) }

  room id=r_living at (0,0)    size 4000x6000 label "Living / Kitchen"
  room id=r_bed    at (4000,0) size 3000x4000 label "Bedroom"
  room id=r_bath   at (4000,4000) size 3000x2000 label "Bath"

  door id=d_main at (1000,6000) width 1000 wall exterior  hinge left  swing in
  door id=d_bed  at (4000,1500) width 900  wall partition hinge left  swing in
  door id=d_bath at (5200,4000) width 800  wall partition hinge right swing out

  window at (2500,0)    width 1800 wall exterior
  window at (7000,2000) width 1200 wall exterior

  furniture bed   at (4300,300) size 1500x2000 label "Bed"
  furniture sofa  at (300,4200) size 2000x900  label "Sofa"

  dim (0,6000)->(7000,6000) offset 600 text "7000"
  dim (7000,0)->(7000,6000) offset 600 text "6000"

  title { project "Studio Apartment" drawn_by "ArchLang" date "2026" }
}`,
        "Single room": `plan "One Room" {
  units mm
  grid 100
  wall exterior thickness 150 { (0,0) (5000,0) (5000,4000) (0,4000) close }
  room id=r at (0,0) size 5000x4000 label "Studio"
  door at (2500,4000) width 900 wall exterior hinge left swing in
  window at (0,2000) width 1500 wall exterior
}`,
      };

      const srcEl = document.getElementById("src");
      const preview = document.getElementById("preview");
      const errorsEl = document.getElementById("errors");
      const statusEl = document.getElementById("status");
      const statusText = document.getElementById("statusText");
      const select = document.getElementById("examples");

      for (const name of Object.keys(EXAMPLES)) {
        const o = document.createElement("option");
        o.value = name;
        o.textContent = name;
        select.appendChild(o);
      }

      let lastSvg = "";
      function run() {
        const { svg, errors, warnings } = compile(srcEl.value, { noCache: true });
        if (errors.length) {
          statusEl.classList.add("err");
          statusText.textContent = `${errors.length} error${errors.length > 1 ? "s" : ""}`;
          errorsEl.classList.add("show");
          errorsEl.textContent = errors
            .map((e) => `line ${e.line ?? "?"}${e.col ? ":" + e.col : ""}  ${e.message}`)
            .join("\n");
          return; // keep last good preview
        }
        statusEl.classList.remove("err");
        statusText.textContent = warnings.length ? `${warnings.length} warning(s)` : "ready";
        errorsEl.classList.toggle("show", warnings.length > 0);
        errorsEl.textContent = warnings
          .map((w) => `warning${w.line ? " line " + w.line : ""}: ${w.message}`)
          .join("\n");
        errorsEl.style.color = warnings.length ? "#8a6d00" : "";
        preview.innerHTML = svg;
        lastSvg = svg;
      }

      let t;
      srcEl.addEventListener("input", () => {
        clearTimeout(t);
        t = setTimeout(run, 250);
      });
      select.addEventListener("change", () => {
        srcEl.value = EXAMPLES[select.value];
        run();
      });
      document.getElementById("download").addEventListener("click", () => {
        if (!lastSvg) return;
        const blob = new Blob([lastSvg], { type: "image/svg+xml" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "floorplan.svg";
        a.click();
        URL.revokeObjectURL(a.href);
      });

      srcEl.value = EXAMPLES["Studio (1BR)"];
      run();
    </script>
  </body>
</html>
