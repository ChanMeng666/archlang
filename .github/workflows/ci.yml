name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Set up Node.js ${{ matrix.node }}
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Lint & format (Biome)
        run: npx biome ci .

      - name: Editor grammars are in sync with the token source
        run: |
          npm run gen:grammars
          git diff --exit-code editors/archlang.tmLanguage.json playground/src/arch-language.js

      - name: Error-code docs are in sync with the catalog
        run: |
          npm run gen:errors
          git diff --exit-code docs/error-codes.md

      - name: LLM spec is in sync with the token source + examples
        run: |
          npm run gen:spec
          git diff --exit-code spec.llm.md

      - name: Bundled agent context is in sync with its sources
        run: |
          npm run gen:llms
          git diff --exit-code llms-full.txt

      - name: GBNF grammar is in sync with the token source
        run: |
          npm run gen:gbnf
          git diff --exit-code grammars/archlang.gbnf

      - name: Plan JSON schema is in sync with its in-code source
        run: |
          npm run gen:plan-schema
          git diff --exit-code schemas/plan.schema.json

      - name: Test
        run: npm test

      - name: Authorability eval (offline golden regression guard)
        run: npm run eval:ci

  bench:
    name: Benchmark (informational)
    runs-on: ubuntu-latest
    # Timings are runner-dependent — this never gates the build; it posts a PR
    # comment with the median per-stage deltas vs. bench/baseline.json.
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run benchmark
        run: |
          npx tsx bench/run.ts --json > bench-current.json
          node bench/compare.mjs bench-current.json bench-comment.md
      - name: Post benchmark comment
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('bench-comment.md', 'utf8');
            const marker = '<!-- archlang-bench -->';
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find((c) => c.body.includes(marker));
            const payload = `${marker}\n${body}`;
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body: payload });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body: payload });
            }
