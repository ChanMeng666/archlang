name: arch-render
description: >-
  Render every ```arch fenced code block in your Markdown into SVG/PNG floor-plan
  images and rewrite each fence to an image link (via the ArchLang `arch md` CLI).
author: ChanMeng666

branding:
  icon: layout
  color: purple

inputs:
  files:
    description: >-
      Markdown files to render. A glob (e.g. "**/*.md") or a space-separated list of
      paths (e.g. "README.md docs/guide.md"). Generated "*.out.md" outputs and
      node_modules are skipped automatically.
    required: false
    default: "**/*.md"
  format:
    description: >-
      Image format for the rendered blocks: "svg" (zero dependency, the default) or
      "png" (rasterized; pulls the optional @resvg/resvg-js at install time).
    required: false
    default: svg
  out-dir:
    description: >-
      Directory to write the rewritten "<name>.out.md" and its images into. Empty
      (the default) writes them alongside each source file. Files that share a
      basename collide here — keep them empty (per-directory) if that matters.
    required: false
    default: ""
  error-svg:
    description: >-
      When "true" (default), a block that fails to compile still renders a
      self-describing error-card image and the block is rewritten to it (the job is
      NOT failed). When "false", a failing block is left as a fence and the job fails.
    required: false
    default: "true"
  version:
    description: >-
      npm version or dist-tag of @chanmeng666/archlang to run via npx (e.g. "latest"
      or "1.11.0"). Ignored when use-local is "true".
    required: false
    default: latest
  use-local:
    description: >-
      Run the CLI from the checked-out repository (node --import tsx src/cli.ts)
      instead of the published npm package. For developing/self-testing THIS repo,
      where the working tree may be ahead of npm. Requires `npm ci` to have run first.
    required: false
    default: "false"

outputs:
  rendered:
    description: Total number of ```arch blocks that rendered successfully.
    value: ${{ steps.render.outputs.rendered }}
  failed:
    description: Total number of ```arch blocks that failed to compile.
    value: ${{ steps.render.outputs.failed }}

runs:
  using: composite
  steps:
    - id: render
      shell: bash
      env:
        INPUT_FILES: ${{ inputs.files }}
        INPUT_FORMAT: ${{ inputs.format }}
        INPUT_OUT_DIR: ${{ inputs.out-dir }}
        INPUT_ERROR_SVG: ${{ inputs.error-svg }}
        INPUT_VERSION: ${{ inputs.version }}
        INPUT_USE_LOCAL: ${{ inputs.use-local }}
      run: |
        set -euo pipefail
        shopt -s globstar nullglob

        # Resolve the runner: the local checkout (self-test / repo dev, may be ahead of
        # npm) or the published package via npx.
        if [ "${INPUT_USE_LOCAL}" = "true" ]; then
          RUN=(node --import tsx "${GITHUB_WORKSPACE}/src/cli.ts" md)
        else
          RUN=(npx -y "@chanmeng666/archlang@${INPUT_VERSION}" md)
        fi

        # Expand `files` (space-separated tokens, each possibly a glob) into a list,
        # skipping node_modules and previously generated *.out.md outputs.
        declare -a files=()
        for pat in ${INPUT_FILES}; do
          for f in $pat; do
            [ -f "$f" ] || continue
            case "$f" in
              */node_modules/*|node_modules/*) continue ;;
              *.out.md) continue ;;
            esac
            files+=("$f")
          done
        done

        if [ ${#files[@]} -eq 0 ]; then
          echo "arch-render: no Markdown files matched '${INPUT_FILES}'."
          echo "rendered=0" >> "$GITHUB_OUTPUT"
          echo "failed=0" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        total_rendered=0
        total_failed=0
        fatal=0

        for f in "${files[@]}"; do
          args=("$f" -f "${INPUT_FORMAT}" --json)
          if [ -n "${INPUT_OUT_DIR}" ]; then
            mkdir -p "${INPUT_OUT_DIR}"
            args+=(-o "${INPUT_OUT_DIR}/$(basename "${f%.md}").out.md")
          fi
          if [ "${INPUT_ERROR_SVG}" = "true" ]; then
            args+=(--error-svg)
          fi

          echo "arch-render: rendering $f"
          set +e
          out=$("${RUN[@]}" "${args[@]}")
          code=$?
          set -e

          # Exit-code policy (arch md: 0 ok / 2 user-source error / 1 IO / 3 usage):
          #   0            → ok.
          #   2            → a block failed to compile. With error-svg an error card was
          #                  still written and the block rewritten, so this is NOT fatal;
          #                  without it the block was left as a fence — fail so it is noticed.
          #   1 / 3        → IO / usage error — always fatal.
          case "$code" in
            0) ;;
            2) [ "${INPUT_ERROR_SVG}" = "true" ] || fatal=1 ;;
            *) fatal=1 ;;
          esac

          # Tally rendered / failed blocks from the --json summary on stdout. Use a
          # command substitution (not `read`, which returns non-zero at a newline-less
          # EOF and would trip `set -e`); node emits "<rendered> <failed>".
          if [ -n "$out" ]; then
            counts=$(printf '%s' "$out" | node -e 'let s="";process.stdin.on("data",d=>s+=d).on("end",()=>{try{const j=JSON.parse(s);const ok=(j.images||[]).filter(i=>i.ok).length;const bad=(j.images||[]).length-ok;process.stdout.write(ok+" "+bad);}catch{process.stdout.write("0 0");}});')
            total_rendered=$((total_rendered + ${counts%% *}))
            total_failed=$((total_failed + ${counts##* }))
          fi
        done

        echo "arch-render: ${total_rendered} block(s) rendered, ${total_failed} failed across ${#files[@]} file(s)."
        echo "rendered=${total_rendered}" >> "$GITHUB_OUTPUT"
        echo "failed=${total_failed}" >> "$GITHUB_OUTPUT"

        if [ "${fatal}" -ne 0 ]; then
          echo "::error::arch-render: a block failed to render and error-svg is off (or an IO/usage error occurred)."
          exit 1
        fi
